[window]
title = "Pdfizer"
width = 1600.0
height = 960.0
min_width = 960.0
min_height = 640.0

[startup]
open_last_document = false
restore_last_page = false
preferred_config_name = "config/pdfizer.toml"
reopen_last_document_on_launch = true

[pdfium]
library_path = ""
library_env_var = "PDFIUM_DYNAMIC_LIB_PATH"

[rendering]
initial_zoom = 1.25
min_zoom = 0.25
max_zoom = 4.0
texture_filter = "linear"
preferred_bg_hex = "#1f1f24"
thumbnail_size = 180
tile_size = 512
tile_render_min_width = 2200
cache_zoom_bucket = 0.05
default_preset = "balanced"
compare_presets = ["balanced", "crisp"]

[ui]
left_panel_width = 280.0
bottom_panel_height = 220.0
thumbnail_panel_width = 220.0
show_metrics = true
show_logs_hint = true
show_thumbnails = true
enable_pixel_inspector = true
compare_mode_default = false

[logging]
level = "debug"
span_events = false
write_to_file = true
file_name = "pdfizer.log"

[storage]
persist_session = true
session_file = "session.toml"
benchmark_dir = "benchmarks"
benchmark_prefix = "render-snapshot"
log_dir = "logs"
