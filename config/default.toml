[window]
title = "Pdfizer"
width = 1600.0
height = 960.0
min_width = 960.0
min_height = 640.0

[startup]
open_last_document = false
restore_last_page = false
preferred_config_name = "config/pdfizer.toml"

[pdfium]
library_path = ""
library_env_var = "PDFIUM_DYNAMIC_LIB_PATH"

[rendering]
initial_zoom = 1.25
min_zoom = 0.25
max_zoom = 4.0
texture_filter = "linear"
preferred_bg_hex = "#1f1f24"

[ui]
left_panel_width = 280.0
bottom_panel_height = 180.0
show_metrics = true
show_logs_hint = true

[logging]
level = "debug"
span_events = false
